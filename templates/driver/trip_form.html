{% extends "base.html" %}
{% block title %}{% if trip %}Edit trip{% else %}Post trip{% endif %} | Magayisa{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card app-card p-4 p-lg-5">
      <h1 class="h3 fw-bold mb-3">{% if trip %}Edit trip{% else %}Post a new trip{% endif %}</h1>
      <form method="post" class="vstack gap-3">
        <div>
          <label class="form-label">Route</label>
          <input class="form-control" type="text" name="route" value="{{ trip.route if trip else '' }}" placeholder="Polokwane to Makhado" required>
        </div>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Date</label>
            <input class="form-control" type="date" name="travel_date" value="{{ trip.travel_date if trip else '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Time</label>
            <input class="form-control" type="time" name="travel_time" value="{{ trip.travel_time if trip else '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Available seats</label>
            <input class="form-control" type="number" min="0" name="available_seats" value="{{ trip.available_seats if trip else 1 }}" required>
          </div>
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Price per seat</label>
            <input class="form-control" type="number" min="0" step="0.01" name="price_per_seat" value="{{ trip.price_per_seat if trip else 0 }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Status</label>
            <select class="form-select" name="status">
              <option value="open" {% if trip and trip.status == 'open' %}selected{% endif %}>Open</option>
              <option value="cancelled" {% if trip and trip.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
            </select>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Save trip</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('driver_dashboard') }}">Back</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
