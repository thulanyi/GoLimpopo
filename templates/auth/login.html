{% extends "base.html" %}
{% block title %}Login | Magayisa{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-xl-5">
    <div class="card app-card p-4 p-lg-5">
      <h1 class="h3 fw-bold mb-3">Login</h1>
      <p class="text-muted mb-4">Access your passenger, driver, or admin dashboard.</p>
      <form method="post" class="vstack gap-3">
        <div>
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required>
        </div>
        <div>
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-primary btn-lg" type="submit">Login</button>
      </form>
      <p class="text-muted mt-3 mb-0">No account yet? <a href="{{ url_for('register') }}">Register here</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
