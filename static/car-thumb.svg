    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="86" height="54" rx="12" fill="url(#panelBg)" stroke="#bfd0e6"/>

  <ellipse cx="44" cy="40" rx="24" ry="5.5" fill="#0f172a" opacity="0.18"/>

  <g transform="translate(12 12)" filter="url(#softShadow)">
    <path d="M12 19h36c3.2 0 6 1.7 7.5 4.5l1.4 2.5v5.5H8v-6.8l2.2-2.9c0.6-0.8 1.1-1.3 1.8-1.8z" fill="url(#bodySide)"/>
    <path d="M19 11h24c2.3 0 4.2 1.3 5.2 3.2l2 4.1H14.2l1.5-3c1-2.6 2.2-4.3 3.3-4.3z" fill="url(#bodyTop)"/>
    <path d="M27 13h16c1.8 0 2.9 0.6 3.6 2l1.1 2.3H24.5l0.8-2.1c0.5-1.4 1.1-2.2 1.7-2.2z" fill="url(#glass)"/>
    <path d="M49 19h6.2c1.3 0 2.3 1 2.3 2.3V24h-8.5z" fill="#1d4ed8" opacity="0.72"/>

